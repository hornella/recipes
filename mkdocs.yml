site_name: Ornella's Recipes
site_description: Personal recipe book
repo_url: https://github.com/hornella/recipes
repo_name: hornella/recipes

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Recipes: recipes/index.md
  - Breads: recipes/breads/index.md
  - Breakfast: recipes/breakfast/index.md
  - Mains: recipes/mains/index.md
  - Sides: recipes/sides/index.md
  - Snacks: recipes/snacks/index.md
  - Desserts: recipes/desserts/index.md
